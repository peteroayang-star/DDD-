version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=your-secret-key-min-32-chars-long!!
      - Jwt__Issuer=DddTemplate.Api
      - Jwt__Audience=DddTemplate.Client
    volumes:
      - ./logs:/app/logs
